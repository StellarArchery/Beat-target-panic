<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archery - Coin Flip</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .stats { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #444; min-width: 80px; }
        .label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; }

        /* ANIMOVANÁ MINCA */
        .coin-container { perspective: 1000px; margin: 40px 0; }
        #coin {
            width: 130px; height: 130px;
            background: #222;
            border: 6px solid gold;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            color: gold;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Táto trieda spustí rotáciu */
        .flipping { animation: flip 0.6s ease-out; }
        @keyframes flip {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(720deg); }
        }

        #instruction { background: #1e1e1e; padding: 20px; border-radius: 10px; margin: 20px 0; min-height: 80px; width: 90%; max-width: 400px; border-left: 5px solid gold; line-height: 1.4; }
        .main-btn { background: gold; color: black; border: none; padding: 20px; width: 85%; max-width: 300px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .controls { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .score-btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 2.5rem; color: white; }
        .plus { background: #2e7d32; }
        .minus { background: #c62828; }
        .reset { background: none; border: 1px solid #444; color: #666; margin-top: 40px; padding: 8px; cursor: pointer; }
        .lang { margin-bottom: 20px; }
        .lang button { background: #333; color: white; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; }
        .active { background: gold !important; color: black !important; }
    </style>
</head>
<body>

    <div class="lang">
        <button id="sk" class="active" onclick="zmenJazyk('sk')">SK</button>
        <button id="en" onclick="zmenJazyk('en')">EN</button>
    </div>

    <div class="stats">
        <div class="box"><span class="label">Hody</span><span id="hody" class="value">0</span></div>
        <div class="box"><span class="label">Skóre</span><span id="skore" class="value">0</span></div>
    </div>

    <div class="coin-container">
        <div id="coin">?</div>
    </div>

    <div id="instruction">Priprav sa na čiaru...</div>

    <button class="main-btn" onclick="hoditMincou()">HODIŤ MINCOU</button>

    <div class="controls">
        <button class="score-btn minus" onclick="zmenBod(-1)">-</button>
        <button class="score-btn plus" onclick="zmenBod(1)">+</button>
    </div>

    <button class="reset" onclick="reset()">RESET</button>

    <script>
        var body = 0;
        var hody = 0;
        var jazyk = 'sk';

        var texty = {
            sk: { head: "VÝSTREL", tail: "MIERENIE", shot: "VÝSTREL: Sústreď sa na proces. Plynulý ťah až do prekvapivého výstrelu.", down: "MIERENIE: Zamieriť na stred, drž 6s a v kľude zlož.", roll: "HODIŤ MINCOU", reset: "Naozaj reset?", ready: "Priprav sa..." },
            en: { head: "SHOT", tail: "AIM", shot: "SHOT: Focus on process. Mantra 'Pulling...', surprise release.", down: "AIM: Aim for 6s, hold the pin, then let down safely.", roll: "FLIP COIN", reset: "Really reset?", ready: "Get ready..." }
        };

        function zmenJazyk(p) {
            jazyk = p;
            document.getElementById('sk').className = (p == 'sk' ? 'active' : '');
            document.getElementById('en').className = (p == 'en' ? 'active' : '');
            document.querySelector('.main-btn').innerText = texty[p].roll;
        }

        function hoditMincou() {
            var c = document.getElementById('coin');
            var i = document.getElementById('instruction');
            
            // Reštart animácie
            c.classList.remove('flipping');
            void c.offsetWidth; 
            c.classList.add('flipping');
            
            c.innerText = "...";
            c.style.borderColor = "gold";

            setTimeout(function() {
                hody++;
                document.getElementById('hody').innerText = hody;
                var vysledok = Math.random() < 0.5;

                if (vysledok) {
                    c.innerText = texty[jazyk].head;
                    c.style.borderColor = "#4caf50"; // Zelená
                    i.innerHTML = "<strong>" + texty[jazyk].shot + "</strong>";
                } else {
                    c.innerText = texty[jazyk].tail;
                    c.style.borderColor = "#2196f3"; // Modrá
                    i.innerHTML = "<strong>" + texty[jazyk].down + "</strong>";
                }
            }, 600);
        }

        function zmenBod(v) {
            body += v;
            document.getElementById('skore').innerText = body;
        }

        function reset() {
            if (confirm(texty[jazyk].reset)) {
                body = 0; hody = 0;
                document.getElementById('skore').innerText = "0";
                document.getElementById('hody').innerText = "0";
                document.getElementById('coin').innerText = "?";
                document.getElementById('coin').style.borderColor = "gold";
                document.getElementById('instruction').innerText = texty[jazyk].ready;
            }
        }
    </script>
</body>
</html>
